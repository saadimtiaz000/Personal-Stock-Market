      <stop offset="0.57" stop-color="#087dff"/>
      <stop offset="1" stop-color="#0439c9"/>
    </linearGradient>
    <linearGradient id="blueDeep" x1="418" y1="250" x2="774" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8dfcff"/>
      <stop offset="0.42" stop-color="#0db8ff"/>
      <stop offset="1" stop-color="#043fd2"/>
    </linearGradient>
    <linearGradient id="edge" x1="160" y1="136" x2="856" y2="842" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7fbff"/>
      <stop offset="0.48" stop-color="#4cdaff"/>
      <stop offset="1" stop-color="#2a82ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="208" y1="134" x2="472" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="0.36" stop-color="#bff9ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
