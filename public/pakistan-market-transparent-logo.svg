      <stop offset="1" stop-color="#061a46"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="51%" cy="43%" r="66%">
      <stop offset="0" stop-color="#0b4ca8" stop-opacity="0.36"/>
      <stop offset="0.56" stop-color="#082b6e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00112d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueMain" x1="172" y1="155" x2="810" y2="845" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60f4ff"/>
