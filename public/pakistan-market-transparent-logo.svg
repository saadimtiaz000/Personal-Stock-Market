<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Pakistan Stock Market Analytics logo</title>
  <desc id="desc">Blue glowing Pakistan stock market logo on a dark rounded iPhone-style background.</desc>
  <defs>
    <linearGradient id="bg" x1="94" y1="64" x2="930" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061c3c"/>
